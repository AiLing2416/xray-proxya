name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags "-s -w" -o xray-proxya-linux-amd64 ./cmd/xray-proxya/

      - name: Build arm64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
          go build -ldflags "-s -w" -o xray-proxya-linux-arm64 ./cmd/xray-proxya/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            xray-proxya-linux-amd64
            xray-proxya-linux-arm64
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
